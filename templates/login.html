<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body class="login-page">
  <form method="post" action="/login" class="login-panel">
    <h1>Twitter Download Web</h1>
    {% if error %}<p class="alert danger">{{ error }}</p>{% endif %}
    <label>
      用户名
      <input name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      密码
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button type="submit" class="primary">登录</button>
    <p class="hint">默认管理员: admin / admin123。首次使用后建议通过环境变量修改。</p>
  </form>
</body>
</html>
