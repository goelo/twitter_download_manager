<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Twitter Download Web" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/tasks">Twitter Download Web</a>
    {% if user %}
      <nav>
        <a href="/tasks">任务</a>
        <a href="/tasks/new">新建</a>
        {% if user.role == "admin" %}
          <a href="/accounts">X账号</a>
        {% endif %}
      </nav>
      <form method="post" action="/logout" class="logout">
        <span>{{ user.username }}</span>
        <button type="submit">退出</button>
      </form>
    {% endif %}
  </header>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
