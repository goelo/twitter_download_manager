{% extends "base.html" %}
{% set title = "任务" %}
{% block content %}
<section class="page-head">
  <div>
    <h1>任务</h1>
    <p>所有下载都会进入队列，默认一次只运行一个任务。</p>
  </div>
  <a href="/tasks/new" class="button primary">新建任务</a>
</section>

<section class="panel">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>标题</th>
        <th>状态</th>
        <th>提交人</th>
        <th>创建时间</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for task in tasks %}
      <tr>
        <td>#{{ task.id }}</td>
        <td>{{ task.title }}</td>
        <td><span class="badge {{ status_class(task.status) }}">{{ task.status }}</span></td>
        <td>{{ task.username }}</td>
        <td>{{ task.created_at }}</td>
        <td><a href="/tasks/{{ task.id }}">查看</a></td>
      </tr>
      {% else %}
      <tr><td colspan="6" class="empty">还没有任务</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
